<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이상한 틱택토 4x4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 550px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        .rules { 
            background: #f0f0f0; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 14px;
        }
        .rules div { margin-bottom: 8px; }
        .label { font-weight: bold; color: #667eea; }
        .board {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 6px;
            margin: 20px auto;
            justify-content: center;
            background: #eee;
            padding: 10px;
            border-radius: 8px;
        }
        .cell {
            width: 60px;
            height: 60px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        .cell:hover { background: #f0f0f0; border-color: #667eea; }
        .cell.o { color: #4285f4; }
        .cell.x { color: #ea4335; }
        .score {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            font-size: 14px;
        }
        .score-item { text-align: center; }
        .score-value { font-size: 24px; font-weight: bold; }
        .status { text-align: center; font-size: 18px; font-weight: bold; margin: 15px 0; height: 30px; }
        .turn { color: #4285f4; }
        .ai-turn { color: #ea4335; }
        .message { color: #34a853; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-reset {
            background: #ea4335;
            color: white;
        }
        .btn-reset:hover { background: #d33425; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 이상한 틱택토 4x4</h1>
        <p class="subtitle">Tic-Tac-Toe But Strange</p>
        
        <div class="rules">
            <div><span class="label">📋 승리 조건:</span> <span id="victory">준비 중...</span></div>
            <div><span class="label">🔄 턴 규칙:</span> <span id="turnRule">준비 중...</span></div>
            <div id="special-info" style="display:none;"><span class="label">✨ 특수 칸:</span> 있음</div>
        </div>

        <div class="score">
            <div class="score-item">
                <div>🔵 당신 (O)</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <div>🤖 AI (X)</div>
                <div class="score-value" id="aiScore">0</div>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button class="btn-start" id="startBtn">게임 시작</button>
            <button class="btn-reset" onclick="location.reload()">새로고침</button>
        </div>

        <div class="footer">
            <p>💡 매 게임마다 다른 규칙이 적용됩니다!</p>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.size = 4;
                this.board = Array(4).fill(null).map(() => Array(4).fill(null));
                this.playerScore = 0;
                this.aiScore = 0;
                this.gameActive = false;
                this.currentTurn = 'O';
                this.rules = null;
                this.render();
            }

            randomizeRules() {
                const victories = [
                    'horizontal_4', 'vertical_4', 'diagonal_4',
                    'square_2x2', 'square_3x3',
                    'corners', 'edges', 'center_2x2',
                    'classic_3'
                ];
                const turns = ['normal', 'double_place', 'flip_opponent', 'seal_random'];
                
                this.rules = {
                    victory: victories[Math.floor(Math.random() * victories.length)],
                    turn: turns[Math.floor(Math.random() * turns.length)],
                    hasSpecial: Math.random() < 0.3
                };

                const victoryNames = {
                    'horizontal_4': '가로 4칸',
                    'vertical_4': '세로 4칸',
                    'diagonal_4': '대각선 4칸',
                    'square_2x2': '2x2 정사각형',
                    'square_3x3': '3x3 정사각형',
                    'corners': '4개 모서리',
                    'edges': '테두리 모두',
                    'center_2x2': '중앙 2x2',
                    'classic_3': '3칸 연결'
                };

                const turnNames = {
                    'normal': '일반 1칸 놓기',
                    'double_place': '2칸 놓기',
                    'flip_opponent': '상대 돌 뒤집기',
                    'seal_random': '랜덤 칸 봉인'
                };

                document.getElementById('victory').textContent = victoryNames[this.rules.victory];
                document.getElementById('turnRule').textContent = turnNames[this.rules.turn];
                document.getElementById('special-info').style.display = this.rules.hasSpecial ? 'block' : 'none';
            }

            start() {
                this.board = Array(4).fill(null).map(() => Array(4).fill(null));
                this.gameActive = true;
                this.currentTurn = 'O';
                this.randomizeRules();
                this.updateStatus();
                this.render();
            }

            playerMove(row, col) {
                if (!this.gameActive || this.currentTurn !== 'O' || this.board[row][col]) return;
                
                this.board[row][col] = 'O';
                if (this.checkWin('O')) {
                    this.playerScore++;
                    this.endGame('축하합니다! 승리! 🎉');
                    return;
                }
                if (this.isFull()) {
                    this.endGame('무승부입니다! 🤝');
                    return;
                }
                this.currentTurn = 'X';
                this.updateStatus();
                this.render();
                setTimeout(() => this.aiMove(), 500);
            }

            aiMove() {
                const available = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!this.board[i][j]) available.push([i, j]);
                    }
                }
                if (!available.length) return;

                let move = this.findWin(available, 'X') || this.findWin(available, 'O') || available[Math.floor(Math.random() * available.length)];
                this.board[move[0]][move[1]] = 'X';

                if (this.checkWin('X')) {
                    this.aiScore++;
                    this.endGame('AI가 승리했습니다! 💔');
                    return;
                }
                if (this.isFull()) {
                    this.endGame('무승부입니다! 🤝');
                    return;
                }
                this.currentTurn = 'O';
                this.updateStatus();
                this.render();
            }

            findWin(available, player) {
                for (let [r, c] of available) {
                    this.board[r][c] = player;
                    if (this.checkWin(player)) {
                        this.board[r][c] = null;
                        return [r, c];
                    }
                    this.board[r][c] = null;
                }
                return null;
            }

            checkWin(p) {
                const b = this.board;
                const v = this.rules.victory;

                // 가로 4칸
                if (v === 'horizontal_4') {
                    for (let i = 0; i < 4; i++) {
                        for (let j = 0; j < 1; j++) {
                            if (b[i][j] === p && b[i][j+1] === p && b[i][j+2] === p && b[i][j+3] === p) return true;
                        }
                    }
                }

                // 세로 4칸
                if (v === 'vertical_4') {
                    for (let i = 0; i < 1; i++) {
                        for (let j = 0; j < 4; j++) {
                            if (b[i][j] === p && b[i+1][j] === p && b[i+2][j] === p && b[i+3][j] === p) return true;
                        }
                    }
                }

                // 대각선 4칸
                if (v === 'diagonal_4') {
                    // ↘
                    for (let i = 0; i < 1; i++) {
                        for (let j = 0; j < 1; j++) {
                            if (b[i][j] === p && b[i+1][j+1] === p && b[i+2][j+2] === p && b[i+3][j+3] === p) return true;
                        }
                    }
                    // ↙
                    for (let i = 0; i < 1; i++) {
                        for (let j = 3; j < 4; j++) {
                            if (b[i][j] === p && b[i+1][j-1] === p && b[i+2][j-2] === p && b[i+3][j-3] === p) return true;
                        }
                    }
                }

                // 2x2 정사각형
                if (v === 'square_2x2') {
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) {
                            if (b[i][j] === p && b[i][j+1] === p && b[i+1][j] === p && b[i+1][j+1] === p) return true;
                        }
                    }
                }

                // 3x3 정사각형
                if (v === 'square_3x3') {
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 2; j++) {
                            let match = true;
                            for (let di = 0; di < 3; di++) {
                                for (let dj = 0; dj < 3; dj++) {
                                    if (b[i+di][j+dj] !== p) match = false;
                                }
                            }
                            if (match) return true;
                        }
                    }
                }

                // 4개 모서리
                if (v === 'corners') {
                    if (b[0][0] === p && b[0][3] === p && b[3][0] === p && b[3][3] === p) return true;
                }

                // 테두리 모두
                if (v === 'edges') {
                    let count = 0;
                    for (let i = 0; i < 4; i++) {
                        if (b[0][i] === p) count++;
                        if (b[3][i] === p) count++;
                        if (i > 0 && i < 3) {
                            if (b[i][0] === p) count++;
                            if (b[i][3] === p) count++;
                        }
                    }
                    if (count === 12) return true;
                }

                // 중앙 2x2
                if (v === 'center_2x2') {
                    if (b[1][1] === p && b[1][2] === p && b[2][1] === p && b[2][2] === p) return true;
                }

                // 3칸 연결 (어디든)
                if (v === 'classic_3') {
                    // 가로
                    for (let i = 0; i < 4; i++) {
                        for (let j = 0; j < 2; j++) {
                            if (b[i][j] === p && b[i][j+1] === p && b[i][j+2] === p) return true;
                        }
                    }
                    // 세로
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 4; j++) {
                            if (b[i][j] === p && b[i+1][j] === p && b[i+2][j] === p) return true;
                        }
                    }
                    // 대각선 ↘
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 2; j++) {
                            if (b[i][j] === p && b[i+1][j+1] === p && b[i+2][j+2] === p) return true;
                        }
                    }
                    // 대각선 ↙
                    for (let i = 0; i < 2; i++) {
                        for (let j = 2; j < 4; j++) {
                            if (b[i][j] === p && b[i+1][j-1] === p && b[i+2][j-2] === p) return true;
                        }
                    }
                }

                return false;
            }

            isFull() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!this.board[i][j]) return false;
                    }
                }
                return true;
            }

            endGame(msg) {
                this.gameActive = false;
                document.getElementById('status').innerHTML = `<span class="message">${msg}</span>`;
                document.getElementById('playerScore').textContent = this.playerScore;
                document.getElementById('aiScore').textContent = this.aiScore;
            }

            updateStatus() {
                if (this.currentTurn === 'O') {
                    document.getElementById('status').innerHTML = '<span class="turn">🔵 당신의 턴</span>';
                } else {
                    document.getElementById('status').innerHTML = '<span class="ai-turn">🤖 AI의 턴</span>';
                }
            }

            render() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (this.board[i][j]) {
                            cell.textContent = this.board[i][j];
                            cell.classList.add(this.board[i][j].toLowerCase());
                        }
                        cell.onclick = () => this.playerMove(i, j);
                        boardEl.appendChild(cell);
                    }
                }
            }
        }

        let game = new Game();
        document.getElementById('startBtn').onclick = () => game.start();
    </script>
</body>
</html>
